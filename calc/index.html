<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>計算機</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
  <style>
    html {
      touch-action: pan-x pan-y;
    }

    * {
      font-family: "BIZ UDPGothic", "HiraginoSans-W2", "Hiragino Kaku Gothic ProN", Meiryo, "メイリオ", sans-serif;
      box-sizing: border-box;
      transition: background-color 0.2s ease, color 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
    }

    :root {
      line-height: 1.5;
      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      --calc-bg: rgba(255, 255, 255, 0.65);
      --calc-blur: 20px;
      --calc-border: 1px solid rgba(255, 255, 255, 0.4);
      --calc-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
      --txt-primary: #1e293b;
      --txt-secondary: #64748b;
      --txt-op: #ffffff;
      --btn-num-bg: rgba(255, 255, 255, 0.8);
      --btn-num-border: 1px solid rgba(255, 255, 255, 0.7);
      --btn-num-txt: #334155;
      --btn-num-hover: #ffffff;
      --btn-num-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
      --btn-func-bg: rgba(226, 232, 240, 0.8);
      --btn-func-txt: #475569;
      --btn-func-hover: rgba(203, 213, 225, 0.9);
      --btn-op-bg: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
      --btn-op-txt: #ffffff;
      --btn-op-hover: linear-gradient(135deg, #4338ca 0%, #2563eb 100%);
      --btn-op-shadow: 0 6px 15px rgba(59, 130, 246, 0.3);
      --btn-disabled: #cbd5e1;
      --focus-color: #6366f1;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        --calc-bg: rgba(30, 41, 59, 0.7);
        --calc-blur: 25px;
        --calc-border: 1px solid rgba(255, 255, 255, 0.08);
        --calc-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        --txt-primary: #f8fafc;
        --txt-secondary: #94a3b8;
        --txt-op: #ffffff;
        --btn-num-bg: rgba(51, 65, 85, 0.5);
        --btn-num-border: 1px solid rgba(255, 255, 255, 0.05);
        --btn-num-txt: #f1f5f9;
        --btn-num-hover: rgba(71, 85, 105, 0.6);
        --btn-num-shadow: 0 4px 12px rgba(0, 0, 0, 0.15);
        --btn-func-bg: rgba(71, 85, 105, 0.4);
        --btn-func-txt: #cbd5e1;
        --btn-func-hover: rgba(100, 116, 139, 0.5);
        --btn-op-bg: linear-gradient(135deg, #6366f1 0%, #60a5fa 100%);
        --btn-op-txt: #ffffff;
        --btn-op-hover: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
        --btn-op-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        --btn-disabled: #475569;
        --focus-color: #818cf8;
      }
    }

    h1, h2, h3, h4, h5, h6,
    li, th, td, div, span,
    code, pre, figcaption, caption,
    time, address, small,
    button, label, summary, output,
    p {
      color: var(--txt-primary);
    }

    body {
      background: var(--bg-gradient);
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      overflow: hidden;
    }

    img {
      max-width: 100%;
    }

    svg {
      fill: currentcolor;
    }

    small {
      font-size: 0.8em;
    }

    *:focus-visible {
      outline: 2px solid var(--focus-color);
      outline-offset: 2px;
    }

    .hp_srOnly {
      position: absolute !important;
      clip: rect(0 0 0 0) !important;
      clip-path: inset(100%) !important;
      width: 1px !important;
      height: 1px !important;
      margin: -1px !important;
      overflow: hidden !important;
      padding: 0 !important;
      border: 0 !important;
    }

    .b01ly_calc {
      --ly_btnArray:
        "nav main main main aside"
        "nav main main main aside"
        "nav main main main aside"
        "nav main main main aside";
      --ly_numArray:
        "b7 b8 b9"
        "b4 b5 b6"
        "b1 b2 b3"
        "b0 bd be";
      --num_hBox: 4;
      --num_wBox: 5;
      --size_btn: min(76px, 15dvw);
      --flexFlow_nav: column nowrap;
      --gap: 0.6rem;
      display: flex;
      flex-flow: column nowrap;
      align-items: center;
      justify-content: center;
      background: var(--calc-bg);
      backdrop-filter: blur(var(--calc-blur));
      -webkit-backdrop-filter: blur(var(--calc-blur));
      border: var(--calc-border);
      box-shadow: var(--calc-shadow);
      padding: 1.5rem;
      border-radius: 24px;
      width: auto;
      height: auto;
      max-width: 92dvw;
    }

    .is_leftMode .b01ly_calc {
      --ly_btnArray:
        "aside main main main nav"
        "aside main main main nav"
        "aside main main main nav"
        "aside main main main nav";
      --ly_numArray:
        "b7 b8 b9"
        "b4 b5 b6"
        "b1 b2 b3"
        "be bd b0";
    }

    @media (max-aspect-ratio: 5/6), (max-width: 500px) {
      .b01ly_calc {
        --ly_btnArray:
          "nav  nav  nav  nav  "
          "main main main aside"
          "main main main aside"
          "main main main aside"
          "main main main aside";
        --num_hBox: 5;
        --num_wBox: 4;
        --flexFlow_nav: row nowrap;
        --size_btn: min(72px, 20dvw);
        padding: 1.2rem;
      }

      .is_leftMode .b01ly_calc {
        --ly_btnArray:
          "nav  nav  nav  nav  "
          "aside main main main"
          "aside main main main"
          "aside main main main"
          "aside main main main";
      }
    }

    .b01ly_calc_header {
      width: 100%;
      margin-bottom: 1.2rem;
      padding: 0.5rem 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-end;
      min-height: 90px;
      background: rgba(0, 0, 0, 0.03);
      border-radius: 16px;
    }

    @media (prefers-color-scheme: dark) {
      .b01ly_calc_header {
        background: rgba(255, 255, 255, 0.03);
      }
    }

    #b01js_label {
      width: 100%;
      height: 24px;
      font-size: 0.95rem;
      color: var(--txt-secondary);
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 400;
    }

    #b01js_output {
      width: 100%;
      height: 54px;
      font-size: 2.25rem;
      font-weight: 600;
      color: var(--txt-primary);
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      display: block;
    }

    .b01ly_calc_btnArray {
      display: grid;
      gap: var(--gap);
      grid-template-areas: var(--ly_btnArray);
    }

    .b01ly_calc_nav {
      grid-area: nav;
      display: flex;
      gap: var(--gap);
      flex-flow: var(--flexFlow_nav);
    }

    .b01ly_calc_main {
      grid-area: main;
      display: grid;
      gap: var(--gap);
      grid-template-areas: var(--ly_numArray);
    }

    #b01js_1 { grid-area: b1; }
    #b01js_2 { grid-area: b2; }
    #b01js_3 { grid-area: b3; }
    #b01js_4 { grid-area: b4; }
    #b01js_5 { grid-area: b5; }
    #b01js_6 { grid-area: b6; }
    #b01js_7 { grid-area: b7; }
    #b01js_8 { grid-area: b8; }
    #b01js_9 { grid-area: b9; }
    #b01js_0 { grid-area: b0; }
    #b01js_DecimalPoint { grid-area: bd; }
    #b01js_Equal { grid-area: be; }

    .b01ly_calc_aside {
      grid-area: aside;
      display: flex;
      gap: var(--gap);
      flex-flow: column nowrap;
    }

    .b01el_calcBtn {
      appearance: none;
      height: var(--size_btn);
      width: var(--size_btn);
      margin: 0;
      padding: 0;
      font-size: calc(var(--size_btn) * 0.35);
      font-style: normal;
      font-weight: 600;
      line-height: 1;
      text-align: center;
      cursor: pointer;
      border-radius: 18px;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .b01el_calcBtn:active {
      transform: scale(0.94);
    }

    .b01el_calcBtn.b01el_calcBtn__primary {
      color: var(--btn-op-txt);
      background: var(--btn-op-bg);
      box-shadow: var(--btn-op-shadow);
    }

    .b01el_calcBtn.b01el_calcBtn__primary:hover {
      background: var(--btn-op-hover);
    }

    .b01el_calcBtn.b01el_calcBtn__primary:disabled {
      background: var(--btn-disabled);
      box-shadow: none;
      cursor: not-allowed;
    }

    .b01el_calcBtn.b01el_calcBtn__secondary {
      color: var(--btn-func-txt);
      background: var(--btn-func-bg);
    }

    .b01el_calcBtn.b01el_calcBtn__secondary:hover {
      background: var(--btn-func-hover);
    }

    .b01el_calcBtn.b01el_calcBtn__secondary:disabled {
      background: var(--btn-disabled);
      opacity: 0.5;
      cursor: not-allowed;
    }

    .b01el_calcBtn.b01el_calcBtn__tertiary {
      color: var(--btn-num-txt);
      background: var(--btn-num-bg);
      border: var(--btn-num-border);
      box-shadow: var(--btn-num-shadow);
    }

    .b01el_calcBtn.b01el_calcBtn__tertiary:hover {
      background: var(--btn-num-hover);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
    }

    .b01el_calcBtn.b01el_calcBtn__tertiary:disabled {
      background: var(--btn-disabled);
      box-shadow: none;
      cursor: not-allowed;
    }

    .b01el_calcBtn.b01el_calcBtn__iconLabel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    .b01el_calcBtn.b01el_calcBtn__iconLabel>svg {
      color: var(--btn-func-txt);
      height: calc(var(--size_btn) * 0.32);
      width: calc(var(--size_btn) * 0.32);
    }

    .b01el_calcBtn.b01el_calcBtn__iconLabel>span {
      font-size: 10px;
      font-weight: 700;
      color: var(--btn-func-txt);
    }

    .b01el_calcBtn:disabled::after {
      width: 40%;
      height: 2px;
      content: "";
      position: absolute;
      top: 50%;
      left: 30%;
      background-color: currentColor;
      transform: rotate(-45deg);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="b01ly_calc">
    <h1 class="hp_srOnly" id="b01_title">簡易電卓</h1>
    <section class="b01ly_calc_header" aria-label="ディスプレイ">
      <span id="b01js_label"></span>
      <output id="b01js_output">0</output>
    </section>
    <div class="b01ly_calc_btnArray">
      <section class="b01ly_calc_nav" aria-label="機能">
        <button type="button" class="b01el_calcBtn b01el_calcBtn__secondary b01el_calcBtn__iconLabel js_btnCloseDialog"
          aria-controls="b01js_dialog_calculator" aria-describedby="b01_title">
          <svg role="graphics-symbol img" aria-hidden="true" version="1.1" xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24" width="24" height="24">
            <path transform="rotate(45)"
              d="m4.9705-2.0012v4.0023h9.9989v9.9989h4.0023v-9.9989h9.9989v-4.0023h-9.9989v-9.9989h-4.0023v9.9989h-9.9989z" />
          </svg>
          <span>閉じる</span>
        </button>
        <button type="button" id="b01js_AllClear" class="b01el_calcBtn b01el_calcBtn__secondary b01el_calcBtn__iconLabel">
          <svg role="graphics-symbol img" aria-hidden="true" version="1.1" xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 48 48" width="48" height="48">
            <path
              d="m24 5.25a21 21 0 0 0-21 21 21 21 0 0 0 4.7812 13.219l-3.2812 3.2812h9v-9l-3.6016 3.6016a18 18 0 0 1-3.8984-11.102 18 18 0 0 1 18-18 18 18 0 0 1 18 18 18 18 0 0 1-5.3047 12.695l2.1172 2.1172a21 21 0 0 0 6.1875-14.812 21 21 0 0 0-21-21z"
              stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span>全消去</span>
        </button>
        <button type="button" id="b01js_BackSpace"
          class="b01el_calcBtn b01el_calcBtn__secondary b01el_calcBtn__iconLabel">
          <svg role="graphics-symbol img" aria-hidden="true" version="1.1" xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 48 48" width="48" height="48">
            <path d="m45.75 22.5v3h-36l12 12-3 3-16.5-16.5 16.5-16.5 3 3-12 12z" />
          </svg>
          <span>1字消去</span>
        </button>
        <button type="button" id="b01js_Copy" class="b01el_calcBtn b01el_calcBtn__secondary b01el_calcBtn__iconLabel">
          <svg role="graphics-symbol img" aria-hidden="true" version="1.1" xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 48 48" width="48" height="48">
            <path
              d="m17.032 8.7h19.336c2.6216 0 4.7322 2.1106 4.7322 4.7322v26.536c0 2.6216-2.1106 4.7322-4.7322 4.7322h-19.336c-2.6216 0-4.7322-2.1106-4.7322-4.7322v-26.536c0-2.6216 2.1104-4.732 4.732-4.732zm-5.4002-5.4c-2.6216 0-4.732 2.1104-4.732 4.732v26.536c0 2.6216 2.1104 4.732 4.732 4.732h0.66797v-25.868c0-2.6216 2.1104-4.732 4.732-4.732h18.668v-0.66797c0-2.6216-2.1104-4.732-4.732-4.732z"
              fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="2.4" />
          </svg>
          <span>コピー</span>
        </button>
      </section>
      <section class="b01ly_calc_main" aria-label="テンキー・実行">
        <button type="button" class="b01el_calcBtn b01el_calcBtn__tertiary" id="b01js_9" data-calc="9">9</button>
        <button type="button" class="b01el_calcBtn b01el_calcBtn__tertiary" id="b01js_8" data-calc="8">8</button>
        <button type="button" class="b01el_calcBtn b01el_calcBtn__tertiary" id="b01js_7" data-calc="7">7</button>
        <button type="button" class="b01el_calcBtn b01el_calcBtn__tertiary" id="b01js_6" data-calc="6">6</button>
        <button type="button" class="b01el_calcBtn b01el_calcBtn__tertiary" id="b01js_5" data-calc="5">5</button>
        <button type="button" class="b01el_calcBtn b01el_calcBtn__tertiary" id="b01js_4" data-calc="4">4</button>
        <button type="button" class="b01el_calcBtn b01el_calcBtn__tertiary" id="b01js_3" data-calc="3">3</button>
        <button type="button" class="b01el_calcBtn b01el_calcBtn__tertiary" id="b01js_2" data-calc="2">2</button>
        <button type="button" class="b01el_calcBtn b01el_calcBtn__tertiary" id="b01js_1" data-calc="1">1</button>
        <button type="button" class="b01el_calcBtn b01el_calcBtn__tertiary" id="b01js_0" data-calc="0">0</button>
        <button type="button" class="b01el_calcBtn b01el_calcBtn__tertiary" id="b01js_DecimalPoint" data-calc="."
          aria-label="小数点">.</button>
        <button type="button" class="b01el_calcBtn b01el_calcBtn__primary" id="b01js_Equal" data-calc="="
          aria-label="計算実行">=</button>
      </section>
      <section class="b01ly_calc_aside" aria-label="四則演算">
        <button type="button" class="b01el_calcBtn b01el_calcBtn__primary" id="b01js_Divide" data-calc="/"
          aria-label="割る">÷</button>
        <button type="button" class="b01el_calcBtn b01el_calcBtn__primary" id="b01js_Multiply" data-calc="*"
          aria-label="掛ける">×</button>
        <button type="button" class="b01el_calcBtn b01el_calcBtn__primary" id="b01js_Subtract" data-calc="-"
          aria-label="引く">−</button>
        <button type="button" class="b01el_calcBtn b01el_calcBtn__primary" id="b01js_Add" data-calc="+"
          aria-label="足す">＋</button>
      </section>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
